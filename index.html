<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 검색 서비스</title>
    <style>
        /* CSS: 화면 분할 레이아웃 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        .main-container { display: flex; height: 100vh; }
        
        /* 왼쪽 검색창 영역 */
        #side-bar {
            width: 300px;
            background: #ffffff;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .search-area { padding: 20px; border-bottom: 1px solid #eee; }
        #results-list { flex: 1; overflow-y: auto; padding: 0; margin: 0; }
        #results-list li { 
            padding: 15px; border-bottom: 1px solid #f0f0f0; list-style: none; cursor: pointer;
        }
        #results-list li:hover { background-color: #f9f9f9; }

        /* 오른쪽 지도 영역 */
        #map-area { flex: 1; position: relative; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="side-bar">
        <div class="search-area">
            <input type="text" id="keyword-input" placeholder="장소를 입력하세요" style="width: 70%;">
            <button onclick="searchQuery()">검색</button>
        </div>
        <ul id="results-list">
            </ul>
    </div>

    <div id="map-area"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5e13afa6a99113c09e16202e98f86d49&libraries=services"></script>

<script>
    let map;
    let placeService;
    let markers = [];

    // 1. 페이지 로드 시 바로 실행
    window.onload = function() {
        initMap();
    };

    // 2. 지도 초기화 함수
    function initMap() {
        const container = document.getElementById('map-area');
        const options = {
            center: new kakao.maps.LatLng(37.5665, 126.9780), // 기본 위치 (서울시청)
            level: 5
        };

        map = new kakao.maps.Map(container, options); // 지도 생성
        placeService = new kakao.maps.services.Places(); // 검색 객체 생성

        // 현재 위치 가져오기 요청
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const currentPos = new kakao.maps.LatLng(lat, lng);

                map.setCenter(currentPos); // 현재 위치로 지도 이동
                displayMarker(currentPos); // 마커 표시
            }, function(err) {
                console.error("위치 권한 거부 또는 오류:", err);
            });
        }
    }

    // 3. 키워드 검색 함수
    function searchQuery() {
        const keyword = document.getElementById('keyword-input').value;

        if (!keyword.trim()) {
            alert("키워드를 입력해주세요!");
            return;
        }

        // 카카오 검색 서비스 실행
        placeService.keywordSearch(keyword, function(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayResults(data);
            } else {
                alert("검색 결과가 없습니다.");
            }
        });
    }

    // 4. 검색 결과 리스트 및 마커 표시
    function displayResults(places) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        clearMarkers(); // 기존 마커 지우기
        listEl.innerHTML = ""; // 기존 리스트 지우기

        places.forEach((place) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            
            // 리스트에 추가
            const li = document.createElement('li');
            li.innerHTML = `<strong>${place.place_name}</strong><br><small>${place.address_name}</small>`;
            li.onclick = () => { map.panTo(position); }; // 클릭 시 해당 위치로 이동
            listEl.appendChild(li);

            // 마커 생성
            const marker = new kakao.maps.Marker({
                map: map,
                position: position
            });
            markers.push(marker);
            bounds.extend(position);
        });

        map.setBounds(bounds); // 결과가 다 보이게 지도 범위 조정
    }

    function displayMarker(position) {
        new kakao.maps.Marker({ map: map, position: position });
    }

    function clearMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
    }
</script>

</body>
</html>
