<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예뻐지기 - 미용실 & 네일아트 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5e13afa6a99113c09e16202e98f86d49&libraries=services"></script>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 2분할 레이아웃 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 영역 */
        .sidebar {
            width: 350px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            background-color: #f9f9f9;
            z-index: 10;
        }

        /* 타이틀 구역 (빛나는 노란색 필기체) */
        .title-box {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }
        
        .title-box h1 {
            font-family: 'Nanum Pen Script', cursive;
            font-size: 40px;
            color: #fee500;
            text-shadow: 0 0 10px #fee500, 0 0 20px #ffcc00;
            letter-spacing: 2px;
        }

        /* 검색창 구역 (연노랑색 배경) */
        .search-box {
            padding: 15px;
            background-color: #fffde7; 
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box form {
            display: flex;
            gap: 5px;
        }

        .search-box input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ffd54f;
            border-radius: 4px;
            font-size: 14px;
        }

        /* 검색 버튼 (주황색) */
        .search-box button {
            padding: 8px 15px;
            background-color: #ff9800; 
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .search-box button:hover {
            background-color: #f57c00;
        }

        /* 카테고리 탭 구역 */
        .tab-container {
            display: flex;
            background-color: #eee;
            border-bottom: 1px solid #ccc;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            text-align: center;
            background-color: #f5f5f5;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab-button.active {
            background-color: #fff;
            color: #ff9800;
            border-bottom: 3px solid #ff9800;
        }

        /* 결과 리스트 구역 */
        .result-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .result-item {
            padding: 15px;
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .result-item:hover {
            background-color: #fff8e1;
        }

        .result-item h5 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }

        .result-item p {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1;
            height: 100%;
        }

        /* --- 카카오맵 커스텀 오버레이 CSS --- */
        /* 위아래로 둥둥 뜨는 이모지 마커 효과 */
        .emoji-marker {
            font-size: 30px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            cursor: pointer;
            animation: bounce 0.6s ease-in-out infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }

        /* 분홍색 구름모양 말풍선 */
        .cloud-overlay {
            position: relative;
            bottom: 60px;
            border-radius: 30px;
            background: #ffb7c5; 
            padding: 15px 20px;
            text-align: center;
            color: #333;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
            white-space: nowrap;
            border: 2px solid #fff;
        }
        /* 구름의 몽실몽실한 곡선 질감 구현 */
        .cloud-overlay:before, .cloud-overlay:after {
            content: '';
            position: absolute;
            background: #ffb7c5;
            border-radius: 50%;
            z-index: -1;
        }
        .cloud-overlay:before { width: 35px; height: 35px; top: -12px; left: 15px; }
        .cloud-overlay:after { width: 28px; height: 28px; top: -8px; right: 15px; }

        .cloud-overlay h5 { margin: 0 0 5px 0; font-size: 14px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .cloud-overlay p { margin: 0 0 8px 0; font-size: 11px; color: #444; }
        .cloud-overlay a { font-size: 11px; color: #7b1fa2; font-weight: bold; text-decoration: none; background: #fff; padding: 3px 8px; border-radius: 12px; }
        
        /* 말풍선 닫기(X) 버튼 */
        .cloud-overlay .close-btn {
            position: absolute;
            top: 2px;
            right: 8px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="title-box">
                <h1>예뻐지기</h1>
            </div>
            
            <div class="search-box">
                <form onsubmit="searchPlaces(); return false;">
                    <input type="text" id="keyword" value="강남역" placeholder="지역이나 역 이름을 입력하세요">
                    <button type="submit">검색</button>
                </form>
            </div>

            <div class="tab-container">
                <button id="tabHair" class="tab-button active" onclick="switchTab('hair')">✂️ hair salon</button>
                <button id="tabNail" class="tab-button" onclick="switchTab('nail')">💅 nail art</button>
            </div>

            <div id="placesList" class="result-list"></div>
        </div>

        <div id="map" class="map-area"></div>
    </div>

    <script>
        // 전역 변수 초기화
        let map;
        let placeSearchService;
        let currentCategory = 'hair'; 
        let customOverlays = [];      
        let activeInfoWindow = null;  

        // API 내부 엔진 로드가 완전히 끝난 뒤 초기화 함수 호출
        kakao.maps.load(function() {
            initMap();
        });

        // 지도 인스턴스 초기 구성 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            
            // 기본값: 서울시청 중심축 설정
            let defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567); 
            
            const mapOptions = {
                center: defaultPosition,
                level: 5 // 확대 레벨 5 설정
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeSearchService = new kakao.maps.services.Places();

            // 사용자의 현위치 트래킹
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const currentPosition = new kakao.maps.LatLng(lat, lon);
                    
                    map.setCenter(currentPosition);
                    
                    // 내 위치 마커를 하늘색 꽃 이모지(🩵 또는 🪻 대신 호환성 높은 이모지 조합)로 커스텀 오버레이 처리
                    const myLocationContent = document.createElement('div');
                    myLocationContent.style.fontSize = '32px';
                    myLocationContent.style.cursor = 'default';
                    myLocationContent.innerText = '🩵'; // 하늘색 하트/꽃 모양 대용

                    const myLocationOverlay = new kakao.maps.CustomOverlay({
                        position: currentPosition,
                        content: myLocationContent,
                        yAnchor: 1
                    });
                    myLocationOverlay.setMap(map);
                    
                    // 권한 획득 성공 시 즉시 주변 인프라 탐색 실행
                    searchPlaces();

                }, function(error) {
                    // 권한 거부 등의 에러 발생 시에도 기본 좌표계 기준 검색으로 우회 처리
                    console.warn("위치 정보를 허용하지 않아 기본 위치로 검색합니다.", error);
                    searchPlaces();
                });
            } else {
                searchPlaces();
            }
        }

        // 탭 제어 스위치 함수
        function switchTab(category) {
            currentCategory = category;
            
            document.getElementById('tabHair').classList.remove('active');
            document.getElementById('tabNail').classList.remove('active');
            
            if (category === 'hair') {
                document.getElementById('tabHair').classList.add('active');
            } else {
                document.getElementById('tabNail').classList.add('active');
            }

            // 기존 지도 오버레이 초기화 렌더링 후 재검색
            clearOverlays();
            searchPlaces();
        }

        // 키워드 서치 핸들러
        function searchPlaces() {
            const searchInput = document.getElementById('keyword').value;
            
            if (!searchInput.trim()) {
                alert('검색할 지역명을 입력해 주세요!');
                return false;
            }

            // 카테고리 맵핑 텍스트 빌드
            const serviceType = currentCategory === 'hair' ? '미용실' : '네일아트';
            const finalQueryStr = `${searchInput} ${serviceType}`;

            // 맵 중심축 스코프 기준 주변부 탐색 설계
            placeSearchService.keywordSearch(finalQueryStr, placesSearchCallback, {
                location: map.getCenter(),
                radius: 3000 // 3km 반경 제한 스코프
            });
        }

        // 키워드 서치 콜백 엔진
        function placesSearchCallback(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                document.getElementById('placesList').innerHTML = '<div style="padding:30px; text-align:center; color:#888; font-size: 14px;">주변에 매장이 없습니다.</div>';
                clearOverlays();
            } else {
                alert('인터넷 연결을 확인하거나 API 서치 도중 오류가 발생했습니다.');
            }
        }

        // 데이터 화면 렌더링 및 엘리먼트 바인딩 구조화
        function displayPlaces(places) {
            const listContainer = document.getElementById('placesList');
            const mapBounds = new kakao.maps.LatLngBounds();
            
            clearOverlays();
            listContainer.innerHTML = '';

            // 카테고리 식별 이모지 설정
            const targetEmoji = currentCategory === 'hair' ? '✂️' : '💅';

            for (let i = 0; i < places.length; i++) {
                const targetPosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                mapBounds.extend(targetPosition);

                // 1. 커스텀 노드 이모지 아이콘 마커 디자인
                const customMarkerNode = document.createElement('div');
                customMarkerNode.className = 'emoji-marker';
                customMarkerNode.innerText = targetEmoji;

                const markerOverlayInstance = new kakao.maps.CustomOverlay({
                    position: targetPosition,
                    content: customMarkerNode,
                    yAnchor: 1
                });
                markerOverlayInstance.setMap(map);
                customOverlays.push(markerOverlayInstance);

                // 2. 분홍색 구름 말풍선 컴포넌트 동적 빌드
                const cloudPopupNode = document.createElement('div');
                cloudPopupNode.className = 'cloud-overlay';
                cloudPopupNode.innerHTML = `
                    <span class="close-btn" onclick="closeOverlay()">×</span>
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].phone ? places[i].phone : '번호 제공 없음'}</p>
                    <a href="https://map.kakao.com/link/map/${places[i].id}" target="_blank">카카오맵 이동</a>
                `;

                const cloudOverlayInstance = new kakao.maps.CustomOverlay({
                    position: targetPosition,
                    content: cloudPopupNode,
                    yAnchor: 1
                });

                // 마커 인터랙션 액션 바인딩
                customMarkerNode.onclick = function() {
                    if (activeInfoWindow) activeInfoWindow.setMap(null);
                    cloudOverlayInstance.setMap(map);
                    activeInfoWindow = cloudOverlayInstance;
                    map.panTo(targetPosition);
                };

                // 3. 사이드 리스트 아이템 UI 바인딩
                const listItemNode = document.createElement('div');
                listItemNode.className = 'result-item';
                listItemNode.innerHTML = `
                    <h5>${targetEmoji} ${places[i].place_name}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                    <p style="color:#ff9800; font-size:11px; margin-top:4px; font-weight:bold;">${places[i].phone}</p>
                `;

                // 리스트 클릭 이벤트 핸들러
                listItemNode.onclick = function() {
                    if (activeInfoWindow) activeInfoWindow.setMap(null);
                    cloudOverlayInstance.setMap(map);
                    activeInfoWindow = cloudOverlayInstance;
                    map.setCenter(targetPosition);
                    map.setLevel(3); // 포커싱 줌 인
                };

                listContainer.appendChild(listItemNode);
            }

            // 서치 바운더리에 맞게 카메라 프레임 조정
            map.setBounds(mapBounds);
        }

        // 말풍선 오프 스위치
        function closeOverlay() {
            if (activeInfoWindow) {
                activeInfoWindow.setMap(null);
                activeInfoWindow = null;
            }
        }

        // 기존 메모리 적재 오버레이 가비지 컬렉션 함수
        function clearOverlays() {
            closeOverlay();
            for (let i = 0; i < customOverlays.length; i++) {
                customOverlays[i].setMap(null);
            }
            customOverlays = [];
        }
    </script>
</body>
</html>
