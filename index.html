<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 내 주변 혼밥/혼카 검색</title>
    <style>
        /* CSS: 화면 분할 및 레이아웃 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Malgun Gothic', sans-serif; }
        .main-container { display: flex; height: 100vh; }
        
        /* 왼쪽 사이드바 디자인 */
        #side-bar {
            width: 350px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            z-index: 2;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        /* 카테고리 탭 스타일 */
        .tab-container { display: flex; background: #f8f9fa; border-bottom: 1px solid #eee; }
        .tab-button {
            flex: 1; padding: 15px; border: none; background: none; 
            font-size: 15px; font-weight: bold; color: #666; cursor: pointer; transition: 0.3s;
        }
        .tab-button.active { color: #333; border-bottom: 3px solid #fee500; background: #fff; }

        /* 검색 영역 스타일 */
        .search-area { padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee; display: flex; gap: 5px; }
        .search-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .search-area button { padding: 10px 15px; background: #fee500; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 검색 결과 리스트 스타일 */
        #results-list { flex: 1; overflow-y: auto; padding: 0; margin: 0; }
        #results-list li { 
            padding: 15px; border-bottom: 1px solid #f1f1f1; list-style: none; cursor: pointer; transition: 0.2s;
        }
        #results-list li:hover { background-color: #f9f9f9; }
        #results-list .place-name { display: block; font-weight: bold; color: #333; margin-bottom: 5px; }
        #results-list .place-address { font-size: 12px; color: #888; display: block; margin-bottom: 2px; }
        #results-list .place-phone { font-size: 11px; color: #0099ff; }

        /* 오른쪽 지도 영역 */
        #map-area { flex: 1; position: relative; }

        /* 내 위치 마커 스타일 (갈색 점 + 맥박 애니메이션) */
        .current-location-marker {
            width: 14px; height: 14px; background: #8B4513; border: 2px solid #fff; border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.5); position: relative;
        }
        .current-location-marker::after {
            content: ''; position: absolute; top: -5px; left: -5px; width: 20px; height: 20px;
            border-radius: 50%; border: 2px solid #8B4513; opacity: 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* 카테고리별 동그란 핀 마커 스타일 */
        .custom-pin-marker {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 20px; box-shadow: 0 3px 6px rgba(0,0,0,0.3); border: 2px solid #fff;
            transform: translate(-50%, -50%); cursor: pointer; transition: transform 0.2s;
        }
        .custom-pin-marker:hover { transform: translate(-50%, -50%) scale(1.1); z-index: 10; }
        .custom-pin-marker.restaurant { background-color: #FFD700; } /* 식당: 노란색 */
        .custom-pin-marker.cafe { background-color: #87CEEB; }        /* 카페: 하늘색 */

        /* 커스텀 말풍선 오버레이 스타일 */
        .custom-overlay-popup {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: #fff; border-radius: 8px; border: 1px solid #ccc;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2); padding: 15px; width: 220px; z-index: 5;
        }
        .custom-overlay-popup::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #fff transparent; display: block; width: 0;
        }
        .custom-overlay-popup .popup-title { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 6px; }
        .custom-overlay-popup .popup-address { font-size: 11px; color: #666; margin-bottom: 4px; line-height: 1.3; }
        .custom-overlay-popup .popup-phone { font-size: 11px; color: #007bff; margin-bottom: 8px; }
        .custom-overlay-popup .popup-link {
            display: block; text-align: center; background: #fee500; color: #333;
            text-decoration: none; font-size: 12px; font-weight: bold; padding: 6px; border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="side-bar">
        <div class="tab-container">
            <button class="tab-button active" id="tab-restaurant" onclick="switchCategory('FD6')">🍔 식당</button>
            <button class="tab-button" id="tab-cafe" onclick="switchCategory('CE7')">☕ 카페</button>
        </div>
        <div class="search-area">
            <input type="text" id="keyword-input" placeholder="메뉴나 이름 입력 (예: 돈까스)" onkeypress="if(event.keyCode==13) searchQuery()">
            <button onclick="searchQuery()">검색</button>
        </div>
        <ul id="results-list"></ul>
    </div>
    <div id="map-area"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5e13afa6a99113c09e16202e98f86d49&libraries=services"></script>

<script>
    let map;
    let placeService;
    let currentPosition = null;       // 사용자의 현재 위치 저장 변수
    let currentCategory = 'FD6';       // 현재 선택된 카테고리 코드 (기본값: 식당 FD6)
    let overlays = [];                // 지도에 표시된 마커들을 관리하는 배열
    let activePopupOverlay = null;     // 현재 열려있는 커스텀 말풍선 오버레이 객체

    window.onload = function() {
        initMap();
    };

    // 1. 지도 초기화 및 현재 위치 가져오기
    function initMap() {
        const container = document.getElementById('map-area');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.978656), // 기본 중심값 (서울시청)
            level: 4
        };

        map = new kakao.maps.Map(container, options);
        placeService = new kakao.maps.services.Places();

        // 현재 위치 권한 요청 및 처리
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                currentPosition = new kakao.maps.LatLng(lat, lng);

                map.setCenter(currentPosition); // 내 위치로 지도 중심 이동
                addCurrentLocationMarker(currentPosition); // 갈색 점 마커 표시
                
                // 위치를 찾으면 해당 위치 기반으로 기본 카테고리(식당) 자동 검색
                searchQuery();
            }, function(error) {
                // 위치 권한 거부 시 기본 중심값 기준으로 검색 수행
                searchQuery();
            });
        } else {
            searchQuery();
        }
    }

    // 2. 내 현재 위치를 갈색 점 마커로 지도에 표시하는 함수
    function addCurrentLocationMarker(position) {
        const content = document.createElement('div');
        content.className = 'current-location-marker';

        const locationOverlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content,
            zIndex: 1
        });
        locationOverlay.setMap(map);
    }

    // 3. 탭 전환 처리 함수
    function switchCategory(categoryCode) {
        currentCategory = categoryCode;
        
        // 버튼 활성화 스타일 클래스 변경
        document.getElementById('tab-restaurant').classList.remove('active');
        document.getElementById('tab-cafe').classList.remove('active');
        
        if (categoryCode === 'FD6') {
            document.getElementById('tab-restaurant').classList.add('active');
        } else {
            document.getElementById('tab-cafe').classList.add('active');
        }

        // 입력창 초기화 후 새 탭 기준 자동 검색 실행
        document.getElementById('keyword-input').value = "";
        searchQuery();
    }

    // 4. 카테고리 및 키워드 기반 주변 장소 검색 실행
    function searchQuery() {
        const keyword = document.getElementById('keyword-input').value.trim();

        // 검색 옵션 설정: 내 위치가 있으면 내 위치 주변 2km 거리순 정렬
        let searchOptions = {
            category_group_code: currentCategory // 현재 활성화된 카테고리 코드 (FD6 또는 CE7)
        };
        
        if (currentPosition) {
            searchOptions.location = currentPosition;
            searchOptions.radius = 2000; // 2km 이내
            searchOptions.sort = kakao.maps.services.SortBy.DISTANCE; // 거리순 정렬
        }

        // 키워드가 빈 값이면 카테고리 기본 검색(categorySearch)을 사용하고, 있으면 키워드 검색(keywordSearch) 적용
        if (keyword === "") {
            placeService.categorySearch(currentCategory, function(data, status) {
                handleSearchResult(data, status);
            }, searchOptions);
        } else {
            placeService.keywordSearch(keyword, function(data, status) {
                handleSearchResult(data, status);
            }, searchOptions);
        }
    }

    // 5. 검색 결과 분기 처리 함수
    function handleSearchResult(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayResults(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            clearMap();
            document.getElementById('results-list').innerHTML = "";
            alert("주변에 해당 장소가 없습니다.");
        } else {
            alert("검색 중 오류가 발생했습니다.");
        }
    }

    // 6. 결과 리스트 출력 및 커스텀 마커 생성
    function displayResults(places) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        clearMap(); // 이전 마커 및 말풍선 삭제
        listEl.innerHTML = "";

        places.forEach((place) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            
            // 리스트 아이템 생성
            const li = document.createElement('li');
            const phoneText = place.phone ? place.phone : "전화번호 없음";
            li.innerHTML = `
                <span class="place-name">${place.place_name}</span>
                <span class="place-address">${place.address_name}</span>
                <span class="place-phone">📞 ${phoneText}</span>
            `;
            
            // 카테고리에 맞는 아이콘(이모지) 및 클래스명 매핑
            let emoji = '🍔';
            let className = 'restaurant';
            if (currentCategory === 'CE7') {
                emoji = '☕';
                className = 'cafe';
            }

            // 지도에 커스텀 핀 마커 추가
            addCustomPinMarker(position, emoji, className, place);

            // 리스트 클릭 이벤트: 해당 좌표로 부드럽게 이동 후 커스텀 말풍선 팝업 열기
            li.onclick = () => {
                map.panTo(position);
                showCustomPopup(position, place);
            };

            listEl.appendChild(li);
            bounds.extend(position);
        });

        // 결과 장소들이 모두 한눈에 보이도록 지도 범위 재조정
        map.setBounds(bounds); 
    }

    // 7. 커스텀 핀 마커 생성 함수
    function addCustomPinMarker(position, emoji, className, place) {
        const content = document.createElement('div');
        content.className = `custom-pin-marker ${className}`;
        content.innerHTML = emoji;
        
        // 마커 클릭 시 커스텀 말풍선 표시
        content.onclick = function() {
            showCustomPopup(position, place);
        };

        const overlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content,
            zIndex: 2
        });

        overlay.setMap(map);
        overlays.push(overlay);
    }

    // 8. 커스텀 말풍선 팝업 표시 함수
    function showCustomPopup(position, place) {
        // 열려있는 기존 말풍선 오버레이가 있다면 제거
        if (activePopupOverlay) {
            activePopupOverlay.setMap(null);
        }

        const popupEl = document.createElement('div');
        popupEl.className = 'custom-overlay-popup';
        
        const phoneText = place.phone ? place.phone : "전화번호 정보 없음";
        
        popupEl.innerHTML = `
            <div class="popup-title">${place.place_name}</div>
            <div class="popup-address">${place.address_name}</div>
            <div class="popup-phone">📞 ${phoneText}</div>
            <a class="popup-link" href="${place.place_url}" target="_blank">카카오맵 상세보기</a>
        `;

        // 팝업 내부 클릭 시 지도 이벤트로 전파되는 현상 막기
        popupEl.onclick = function(e) {
            e.stopPropagation();
        };

        // 지도 빈 곳을 클릭하거나 다른 작업을 할 때 닫기 용이하도록 커스텀 오버레이로 생성
        activePopupOverlay = new kakao.maps.CustomOverlay({
            position: position,
            content: popupEl,
            yAnchor: 1.2, // 마커보다 약간 위쪽에 배치되도록 앵커 포인트 조정
            zIndex: 3
        });

        activePopupOverlay.setMap(map);
    }

    // 9. 기존 마커 데이터 및 열려있는 말풍선 클리어 함수
    function clearMap() {
        overlays.forEach(o => o.setMap(null));
        overlays = [];
        if (activePopupOverlay) {
            activePopupOverlay.setMap(null);
            activePopupOverlay = null;
        }
    }
</script>

</body>
</html>
