<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예뻐지기 - 미용실 & 네일아트 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5e13afa6a99113c09e16202e98f86d49&libraries=services"></script>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 영역 */
        .sidebar {
            width: 350px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            background-color: #f9f9f9;
            z-index: 10;
        }

        /* 타이틀 구역 (빛나는 노란색 필기체) */
        .title-box {
            background-color: #333;
            padding: 20px 15px 10px 15px;
            text-align: center;
        }
        
        .title-box h1 {
            font-family: 'Nanum Pen Script', cursive;
            font-size: 42px;
            color: #fee500;
            text-shadow: 0 0 10px #fee500, 0 0 20px #ffcc00;
            letter-spacing: 2px;
        }

        /* 검색창 구역 (연노랑색 배경) */
        .search-box {
            padding: 15px;
            background-color: #fffde7; /* 연노랑색 */
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box form {
            display: flex;
            gap: 5px;
        }

        .search-box input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ffd54f;
            border-radius: 4px;
            font-size: 14px;
        }

        /* 검색 버튼 (주황색) */
        .search-box button {
            padding: 8px 15px;
            background-color: #ff9800; /* 주황색 */
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .search-box button:hover {
            background-color: #f57c00;
        }

        /* 카테고리 탭 구역 */
        .tab-container {
            display: flex;
            background-color: #eee;
            border-bottom: 1px solid #ccc;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            text-align: center;
            background-color: #f5f5f5;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab-button.active {
            background-color: #fff;
            color: #ff9800;
            border-bottom: 3px solid #ff9800;
        }

        /* 결과 리스트 구역 */
        .result-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .result-item {
            padding: 15px;
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .result-item:hover {
            background-color: #fff8e1;
        }

        .result-item h5 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }

        .result-item p {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1;
            height: 100%;
        }

        /* --- 카카오맵 커스텀 오버레이 CSS 스타일 정의 --- */
        /* 이모지 마커 스타일 */
        .emoji-marker {
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            cursor: pointer;
            animation: bounce 0.5s ease-in-out infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        /* 분홍색 구름모양 말풍선 스타일 */
        .cloud-overlay {
            position: relative;
            bottom: 55px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            background: #ffb7c5; /* 분홍색 구름 배경 */
            padding: 15px 20px;
            text-align: center;
            color: #333;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.15);
            white-space: nowrap;
            border: 2px solid #fff;
        }
        /* 구름의 몽실몽실한 효과를 위한 가상 요소 추가 */
        .cloud-overlay:before, .cloud-overlay:after {
            content: '';
            position: absolute;
            background: #ffb7c5;
            border-radius: 50%;
            z-index: -1;
        }
        .cloud-overlay:before { width: 40px; height: 40px; top: -15px; left: 15px; }
        .cloud-overlay:after { width: 30px; height: 30px; top: -10px; right: 15px; }

        .cloud-overlay h5 { margin: 0 0 4px 0; font-size: 14px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .cloud-overlay p { margin: 0 0 6px 0; font-size: 11px; color: #555; }
        .cloud-overlay a { font-size: 11px; color: #7b1fa2; font-weight: bold; text-decoration: none; background: #fff; padding: 2px 6px; border-radius: 10px; }
        
        /* 닫기 버튼 */
        .cloud-overlay .close-btn {
            position: absolute;
            top: 2px;
            right: 10px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="title-box">
                <h1>예뻐지기</h1>
            </div>
            
            <div class="search-box">
                <form onsubmit="searchPlaces(); return false;">
                    <input type="text" id="keyword" value="강남역" placeholder="지역이나 지하철역을 입력하세요">
                    <button type="submit">검색</button>
                </form>
            </div>

            <div class="tab-container">
                <button id="tabHair" class="tab-button active" onclick="switchTab('hair')">✂️ hair salon</button>
                <button id="tabNail" class="tab-button" onclick="switchTab('nail')">💅 nail art</button>
            </div>

            <div id="placesList" class="result-list"></div>
        </div>

        <div id="map" class="map-area"></div>
    </div>

    <script>
        // 전역 변수 선언
        let map;
        let placeSearchService;
        let currentCategory = 'hair'; // 기본 카테고리는 미용실
        let customOverlays = [];      // 커스텀 마커와 말풍선들을 저장할 배열
        let activeInfoWindow = null;  // 현재 열려있는 구름 말풍선 객체

        // 지도 라이브러리 로딩 보장
        kakao.maps.load(function() {
            initMap();
        });

        // 지도 초기화
        function initMap() {
            const mapContainer = document.getElementById('map');
            let defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567); 
            
            const mapOptions = {
                center: defaultPosition,
                level: 5
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeSearchService = new kakao.maps.services.Places();

            // Geolocation으로 현재 위치 설정
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const currentPosition = new kakao.maps.LatLng(lat, lon);
                    
                    map.setCenter(currentPosition);
                    
                    // 내 위치를 하늘색 꽃 이모지(🪻 또는 🩵) 커스텀 오버레이로 표시
                    const myLocationContent = '<div class="emoji-marker" style="font-size:32px;">🩵</div>';
                    const myLocationOverlay = new kakao.maps.CustomOverlay({
                        position: currentPosition,
                        content: myLocationContent,
                        yAnchor: 1
                    });
                    myLocationOverlay.setMap(map);
                    
                    // 첫 로드 시 현재 내 위치 주변을 자동 검색
                    searchPlaces();

                }, function(error) {
                    console.error("위치 정보를 가져오지 못했습니다.", error);
                    searchPlaces(); // 실패해도 기본 좌표 기준으로 검색 실행
                });
            } else {
                searchPlaces();
            }
        }

        // 탭 전환 함수
        function switchTab(category) {
            currentCategory = category;
            
            // 탭 스타일 활성화 처리
            document.getElementById('tabHair').classList.remove('active');
            document.getElementById('tabNail').classList.remove('active');
            
            if (category === 'hair') {
                document.getElementById('tabHair').classList.add('active');
            } else {
                document.getElementById('tabNail').classList.add('active');
            }

            // 기존 마커 및 말풍선 완전히 지우고 새로 검색
            clearOverlays();
            searchPlaces();
        }

        // 검색 실행 함수
        function searchPlaces() {
            const baseKeyword = document.getElementById('keyword').value;
            
            if (!baseKeyword.trim()) {
                alert('위치를 입력해주세요! (예: 강남역, 홍대 등)');
                return false;
            }

            // 선택된 탭에 맞는 타겟 키워드 조합 (예: 강남역 미용실 / 강남역 네일아트)
            const serviceKeyword = currentCategory === 'hair' ? '미용실' : '네일아트';
            const finalQuery = `${baseKeyword} ${serviceKeyword}`;

            // 지도의 중심점 근처로 검색 결과 요청
            placeSearchService.keywordSearch(finalQuery, placesSearchCallback, {
                location: map.getCenter(),
                radius: 2000 // 중심점 기준 2km 반경 우선 검색
            });
        }

        // 검색 완료 콜백
        function placesSearchCallback(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                document.getElementById('placesList').innerHTML = '<div style="padding:20px; text-align:center; color:#999;">검색 결과가 없습니다.</div>';
                clearOverlays();
            } else {
                alert('검색 중 오류가 발생했습니다.');
            }
        }

        // 장소 표시 및 리스트 바인딩 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            clearOverlays();
            listEl.innerHTML = '';

            // 카테고리별 이모지 지정 (hair: 가위, nail: 손톱)
            const emoji = currentCategory === 'hair' ? '✂️' : '💅';

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                bounds.extend(placePosition);

                // 1. 이모지 마커용 커스텀 오버레이 생성
                const markerContent = document.createElement('div');
                markerContent.className = 'emoji-marker';
                markerContent.innerText = emoji;

                const markerOverlay = new kakao.maps.CustomOverlay({
                    position: placePosition,
                    content: markerContent,
                    yAnchor: 1
                });
                markerOverlay.setMap(map);
                customOverlays.push(markerOverlay); // 관리 배열에 추가

                // 2. 장소 클릭 시 나타날 분홍색 구름 모양 말풍선 오버레이 생성
                const cloudContent = document.createElement('div');
                cloudContent.className = 'cloud-overlay';
                cloudContent.innerHTML = `
                    <span class="close-btn" onclick="closeOverlay()">×</span>
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].phone ? places[i].phone : '전화번호 없음'}</p>
                    <a href="https://map.kakao.com/link/map/${places[i].id}" target="_blank">카카오맵 바로가기</a>
                `;

                const infoOverlay = new kakao.maps.CustomOverlay({
                    position: placePosition,
                    content: cloudContent,
                    yAnchor: 1
                });

                // 마커 이모지를 클릭하면 구름 말풍선 띄우기
                markerContent.onclick = function() {
                    if (activeInfoWindow) activeInfoWindow.setMap(null); // 기존에 열려있던 말풍선 닫기
                    infoOverlay.setMap(map);
                    activeInfoWindow = infoOverlay;
                    map.panTo(placePosition);
                };

                // 3. 왼쪽 사이드바 리스트 아이템 동적 생성
                const itemEl = document.createElement('div');
                itemEl.className = 'result-item';
                itemEl.innerHTML = `
                    <h5>${emoji} ${places[i].place_name}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                    <p style="color:#ff9800; font-size:11px; margin-top:3px;">${places[i].phone}</p>
                `;

                // 리스트 아이템 클릭 시 지도 이동 및 말풍선 켜기
                itemEl.onclick = function() {
                    if (activeInfoWindow) activeInfoWindow.setMap(null);
                    infoOverlay.setMap(map);
                    activeInfoWindow = infoOverlay;
                    map.setCenter(placePosition);
                    map.setLevel(3); // 상세히 보도록 확대
                };

                listEl.appendChild(itemEl);
            }

            // 검색된 장소들을 한눈에 볼 수 있도록 지도 영역 재조정
            map.setBounds(bounds);
        }

        // 현재 켜져있는 구름 말풍선을 닫는 함수
        function closeOverlay() {
            if (activeInfoWindow) {
                activeInfoWindow.setMap(null);
                activeInfoWindow = null;
            }
        }

        // 기존에 지도 위에 그려진 모든 커스텀 오버레이를 삭제하는 함수
        function clearOverlays() {
            closeOverlay();
            for (let i = 0; i < customOverlays.length; i++) {
                customOverlays[i].setMap(null);
            }
            customOverlays = [];
        }
    </script>
</body>
</html>
