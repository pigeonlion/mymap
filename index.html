<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 이모지 검색 서비스</title>
    <style>
        /* CSS: 화면 분할 레이아웃 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Malgun Gothic', sans-serif; }
        .main-container { display: flex; height: 100vh; }
        
        /* 왼쪽 사이드바 */
        #side-bar {
            width: 350px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            z-index: 2;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .search-area { padding: 20px; background: #fff; border-bottom: 1px solid #eee; }
        .search-area input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .search-area button { padding: 10px; background: #fee500; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        #results-list { flex: 1; overflow-y: auto; padding: 0; margin: 0; }
        #results-list li { 
            padding: 15px; border-bottom: 1px solid #f1f1f1; list-style: none; cursor: pointer; transition: 0.2s;
        }
        #results-list li:hover { background-color: #f9f9f9; }
        #results-list .place-name { display: block; font-weight: bold; color: #333; margin-bottom: 5px; }
        #results-list .place-address { font-size: 12px; color: #888; }

        /* 오른쪽 지도 영역 */
        #map-area { flex: 1; }

        /* 이모지 마커 스타일 */
        .emoji-marker {
            font-size: 30px;
            cursor: pointer;
            transform: translate(-50%, -50%); /* 중심점 맞추기 */
        }

        /* 커스텀 인포윈도우 스타일 */
        .custom-popup {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            padding: 10px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            font-size: 12px;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="side-bar">
        <div class="search-area">
            <input type="text" id="keyword-input" placeholder="예: 카페, 돈까스, 편의점" onkeypress="if(event.keyCode==13) searchQuery()">
            <button onclick="searchQuery()">검색</button>
        </div>
        <ul id="results-list"></ul>
    </div>
    <div id="map-area"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5e13afa6a99113c09e16202e98f86d49&libraries=services"></script>

<script>
    let map;
    let placeService;
    let overlays = []; // 이모지 마커(CustomOverlay)들을 저장할 배열
    let currentInfoWindow = null; // 현재 열려있는 인포윈도우

    window.onload = function() {
        initMap();
    };

    // 1. 지도 초기화
    function initMap() {
        const container = document.getElementById('map-area');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.978656), // 기본 서울시청
            level: 5
        };

        map = new kakao.maps.Map(container, options);
        placeService = new kakao.maps.services.Places();

        // 내 위치 가져오기
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const currentPos = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                map.setCenter(currentPos);
                addEmojiMarker(currentPos, "📍", { place_name: "내 위치", address_name: "현재 있는 곳" });
            });
        }
    }

    // 2. 키워드 검색
    function searchQuery() {
        const keyword = document.getElementById('keyword-input').value;

        if (!keyword.trim()) {
            alert("장소를 입력해주세요!");
            return;
        }

        // 주변 검색 수행
        placeService.keywordSearch(keyword, function(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayResults(data, keyword);
            } else {
                alert("결과가 없거나 오류가 발생했습니다.");
            }
        });
    }

    // 3. 검색 결과 표시
    function displayResults(places, keyword) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        clearOverlays();
        listEl.innerHTML = "";

        // 검색어에 따른 이모지 선택 (기본값은 🚩)
        let emoji = "🚩";
        if (keyword.includes("카페")) emoji = "☕";
        else if (keyword.includes("맛집") || keyword.includes("식당")) emoji = "🍴";
        else if (keyword.includes("돈까스")) emoji = "🐷";
        else if (keyword.includes("편의점")) emoji = "🏪";

        places.forEach((place) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            
            // 리스트 생성
            const li = document.createElement('li');
            li.innerHTML = `<span class="place-name">${place.place_name}</span>
                            <span class="place-address">${place.address_name}</span>`;
            
            // 이모지 마커 추가
            const overlay = addEmojiMarker(position, emoji, place);

            li.onclick = () => {
                map.panTo(position);
                showPopup(position, place);
            };

            listEl.appendChild(li);
            bounds.extend(position);
        });

        map.setBounds(bounds);
    }

    // 4. 이모지 마커(CustomOverlay) 생성 함수
    function addEmojiMarker(position, emoji, place) {
        const content = document.createElement('div');
        content.className = 'emoji-marker';
        content.innerHTML = emoji;
        
        // 이모지 클릭 시 팝업 표시
        content.onclick = function() {
            showPopup(position, place);
        };

        const customOverlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content
        });

        customOverlay.setMap(map);
        overlays.push(customOverlay);
        return customOverlay;
    }

    // 5. 마커 클릭 시 나타날 팝업(InfoWindow) 함수
    function showPopup(position, place) {
        if (currentInfoWindow) currentInfoWindow.close();

        const content = `
            <div style="padding:10px; min-width:150px;">
                <div style="font-weight:bold; margin-bottom:5px;">${place.place_name}</div>
                <div style="font-size:11px; color:#666;">${place.address_name}</div>
                <a href="${place.place_url}" target="_blank" style="display:inline-block; margin-top:5px; color:#007bff; font-size:11px; text-decoration:none;">상세보기</a>
            </div>`;

        currentInfoWindow = new kakao.maps.InfoWindow({
            position: position,
            content: content,
            removable: true
        });

        currentInfoWindow.open(map);
    }

    // 기존 데이터 초기화
    function clearOverlays() {
        overlays.forEach(o => o.setMap(null));
        overlays = [];
        if (currentInfoWindow) currentInfoWindow.close();
    }
</script>

</body>
</html>
