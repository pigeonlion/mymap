<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Kakao Map Search</title>
    <style>
        /* 1. 기본 레이아웃 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 2. 왼쪽 검색 사이드바 (300px 고정) */
        #menu_wrap {
            width: 350px;
            height: 100%;
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            z-index: 10;
            padding: 15px;
            box-sizing: border-box;
        }

        /* 3. 오른쪽 지도 영역 (나머지 전체) */
        #map_container {
            flex: 1;
            height: 100%;
        }

        .search_box {
            margin-bottom: 20px;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px;
            cursor: pointer;
        }

        #placesList li {
            list-style: none;
            padding: 10px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
        }

        #placesList li:hover {
            background-color: #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu_wrap">
        <div class="search_box">
            <form onsubmit="searchPlaces(); return false;">
                키워드 : <input type="text" value="강남역 맛집" id="keyword" size="15"> 
                <button type="submit">검색하기</button> 
            </form>
        </div>
        <hr>
        <ul id="placesList"></ul>
    </div>

    <div id="map_container"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5e13afa6a99113c09e16202e98f86d49&libraries=services&autoload=false"></script>

<script>
    let map;
    let ps; // 장소 검색 객체
    let markers = []; // 마커를 담을 배열

    // 1. 카카오맵 SDK 로드 후 실행
    kakao.maps.load(function() {
        const container = document.getElementById('map_container');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 임시 중심 좌표 (서울시청)
            level: 5 // 지도 확대 레벨
        };

        map = new kakao.maps.Map(container, options); // 지도 생성
        ps = new kakao.maps.services.Places(); // 장소 검색 객체 생성

        // 2. 현재 위치 권한 요청 및 지도 중심 이동
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude; // 위도
                const lon = position.coords.longitude; // 경도
                
                const locPosition = new kakao.maps.LatLng(lat, lon);
                map.setCenter(locPosition); // 현재 위치로 중심 이동
                
                // 현재 위치 마커 표시
                displayMarker(locPosition, "내 위치");
            });
        }
    });

    // 키워드 검색을 요청하는 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return false;
        }

        // 장소 검색 객체를 통해 키워드로 장소검색을 요청
        ps.keywordSearch(keyword, placesSearchCB); 
    }

    // 장소검색이 완료됐을 때 호출되는 콜백함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data); // 검색 결과 리스트 및 마커 표시
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('검색 결과 중 오류가 발생했습니다.');
        }
    }

    // 검색 결과 목록과 마커를 표출하는 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('placesList');
        const bounds = new kakao.maps.LatLngBounds();
        
        removeMarker(); // 기존 마커 제거
        listEl.innerHTML = ''; // 기존 리스트 초기화

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const marker = addMarker(placePosition); // 마커 추가
            const itemEl = getListItem(i, places[i]); // 리스트 아이템 생성

            // 검색된 장소 위치를 기준으로 지도 범위 재설정
            bounds.extend(placePosition);

            // 리스트 클릭 시 해당 장소로 지도 이동
            itemEl.onclick = function() {
                map.panTo(placePosition);
            };

            listEl.appendChild(itemEl);
        }
        map.setBounds(bounds); // 검색된 결과들이 다 보이도록 지도 범위 조정
    }

    // 마커를 생성하고 지도 위에 표시하는 함수
    function addMarker(position) {
        const marker = new kakao.maps.Marker({
            position: position
        });
        marker.setMap(map);
        markers.push(marker);
        return marker;
    }

    // 지도 위에 표시되고 있는 마커를 모두 제거하는 함수
    function removeMarker() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }   
        markers = [];
    }

    // 검색결과 항목을 Element로 반환하는 함수
    function getListItem(index, places) {
        const el = document.createElement('li');
        let itemStr = '<div>';
        itemStr += '   <h5>' + places.place_name + '</h5>';
        itemStr += '   <span>' + places.address_name + '</span>';
        itemStr += '</div>';
        el.innerHTML = itemStr;
        return el;
    }

    // 위치 표시용 단순 마커 생성 함수
    function displayMarker(locPosition, message) {
        const marker = new kakao.maps.Marker({  
            map: map, 
            position: locPosition
        }); 
    }
</script>

</body>
</html>
