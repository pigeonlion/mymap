<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 내 주변 장소 검색</title>
    <style>
        /* CSS: 화면 분할 및 레이아웃 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Malgun Gothic', sans-serif; }
        .main-container { display: flex; height: 100vh; }
        
        /* 왼쪽 사이드바 디자인 */
        #side-bar {
            width: 350px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            z-index: 2;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .search-area { padding: 20px; background: #fff; border-bottom: 1px solid #eee; }
        .search-area input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .search-area button { padding: 10px; background: #fee500; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 검색 결과 리스트 스타일 */
        #results-list { flex: 1; overflow-y: auto; padding: 0; margin: 0; }
        #results-list li { 
            padding: 15px; border-bottom: 1px solid #f1f1f1; list-style: none; cursor: pointer; transition: 0.2s;
        }
        #results-list li:hover { background-color: #f9f9f9; }
        #results-list .place-name { display: block; font-weight: bold; color: #333; margin-bottom: 5px; }
        #results-list .place-address { font-size: 12px; color: #888; }

        /* 오른쪽 지도 */
        #map-area { flex: 1; position: relative; }

        /* 핀 이모지 마커 스타일 */
        .emoji-marker {
            font-size: 30px;
            cursor: pointer;
            transform: translate(-50%, -100%); /* 이모지의 하단 끝이 좌표에 오도록 설정 */
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="side-bar">
        <div class="search-area">
            <input type="text" id="keyword-input" placeholder="음식 종류 입력 (예: 돈까스)" onkeypress="if(event.keyCode==13) searchQuery()">
            <button onclick="searchQuery()">검색</button>
        </div>
        <ul id="results-list"></ul>
    </div>
    <div id="map-area"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5e13afa6a99113c09e16202e98f86d49&libraries=services"></script>

<script>
    let map;
    let placeService;
    let currentPosition = null; // 사용자의 현재 위치 저장 변수
    let overlays = []; // 지도에 표시된 이모지들을 관리하는 배열
    let infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 }); // 정보창 객체

    window.onload = function() {
        initMap();
    };

    // 1. 지도 초기화
    function initMap() {
        const container = document.getElementById('map-area');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.978656), // 기본 서울시청
            level: 5
        };

        map = new kakao.maps.Map(container, options);
        placeService = new kakao.maps.services.Places();

        // 2. 현재 위치 권한 요청
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                currentPosition = new kakao.maps.LatLng(lat, lng);

                map.setCenter(currentPosition); // 내 위치로 지도 중심 이동
                addEmojiOverlay(currentPosition, '🏠', { place_name: "우리 집(내 위치)", address_name: "현재 위치입니다" });
            });
        }
    }

    // 3. 주변 장소 검색 실행
    function searchQuery() {
        const keyword = document.getElementById('keyword-input').value;

        if (!keyword.trim()) {
            alert("음식 종류를 입력해주세요!");
            return;
        }

        // 검색 옵션 설정: 내 위치가 있으면 내 위치 주변 2km(radius)로 설정
        let searchOptions = {};
        if (currentPosition) {
            searchOptions = {
                location: currentPosition,
                radius: 2000, // 2km 이내 검색
                sort: kakao.maps.services.SortBy.DISTANCE // 거리순 정렬
            };
        }

        // 키워드 검색 API 호출
        placeService.keywordSearch(keyword, function(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayResults(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert("주변에 해당 장소가 없습니다.");
            } else {
                alert("검색 중 오류가 발생했습니다.");
            }
        }, searchOptions);
    }

    // 4. 결과 리스트 및 이모지 마커 표시
    function displayResults(places) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        clearMap(); // 이전 마커 및 정보창 삭제
        listEl.innerHTML = "";

        places.forEach((place) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            
            // 리스트 아이템 생성
            const li = document.createElement('li');
            li.innerHTML = `<span class="place-name">${place.place_name}</span>
                            <span class="place-address">${place.address_name}</span>`;
            
            // 이모지 핀 추가
            addEmojiOverlay(position, '📍', place);

            // 리스트 클릭 시 이동 및 팝업
            li.onclick = () => {
                map.panTo(position);
                showPlacePopup(position, place);
            };

            listEl.appendChild(li);
            bounds.extend(position);
        });

        map.setBounds(bounds); // 결과물들이 다 보이게 지도 범위 조정
    }

    // 5. 이모지 오버레이(마커) 생성 함수
    function addEmojiOverlay(position, emoji, place) {
        const content = document.createElement('div');
        content.className = 'emoji-marker';
        content.innerHTML = emoji;
        
        // 이모지 클릭 시 메뉴(장소 정보) 팝업
        content.onclick = function() {
            showPlacePopup(position, place);
        };

        const overlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content
        });

        overlay.setMap(map);
        overlays.push(overlay);
        return overlay;
    }

    // 6. 장소 정보 팝업 표시
    function showPlacePopup(position, place) {
        const content = `
            <div style="padding:10px; font-size:12px; line-height:1.4;">
                <strong>${place.place_name}</strong><br>
                <span>${place.address_name}</span><br>
                <a href="${place.place_url}" target="_blank" style="color:blue; text-decoration:none;">상세보기</a>
            </div>`;
        
        infoWindow.setContent(content);
        infoWindow.setPosition(position);
        infoWindow.open(map);
    }

    // 기존 데이터 정리 함수
    function clearMap() {
        overlays.forEach(o => o.setMap(null));
        overlays = [];
        infoWindow.close();
    }
</script>

</body>
</html>
