<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* CSS: 화면 분할 레이아웃 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Malgun Gothic', sans-serif; }
        .main-container { display: flex; height: 100vh; }
        
        /* 왼쪽 사이드바 */
        #side-bar {
            width: 350px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            z-index: 2;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .search-area { padding: 20px; background: #fff; border-bottom: 1px solid #eee; }
        .search-area input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .search-area button { padding: 10px; background: #fee500; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        #results-list { flex: 1; overflow-y: auto; padding: 0; margin: 0; }
        #results-list li { 
            padding: 15px; border-bottom: 1px solid #f1f1f1; list-style: none; cursor: pointer; transition: 0.2s;
        }
        #results-list li:hover { background-color: #f9f9f9; }
        #results-list .place-name { display: block; font-weight: bold; color: #333; margin-bottom: 5px; }
        #results-list .place-address { font-size: 12px; color: #888; }

        /* 오른쪽 지도 */
        #map-area { flex: 1; }

        /* 인포윈도우 커스텀 스타일 */
        .info-window { padding: 10px; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="side-bar">
        <div class="search-area">
            <input type="text" id="keyword-input" placeholder="예: 강남역 카페, 맛집" onkeypress="if(event.keyCode==13) searchQuery()">
            <button onclick="searchQuery()">검색</button>
        </div>
        <ul id="results-list"></ul>
    </div>
    <div id="map-area"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5e13afa6a99113c09e16202e98f86d49&libraries=services"></script>

<script>
    let map;
    let placeService;
    let markers = [];
    let infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 }); // 정보창 객체

    window.onload = function() {
        initMap();
    };

    // 1. 지도 초기화
    function initMap() {
        const container = document.getElementById('map-area');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.978656), // 기본 서울시청
            level: 5
        };

        map = new kakao.maps.Map(container, options);
        placeService = new kakao.maps.services.Places();

        // 현재 위치 가져오기
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const currentPos = new kakao.maps.LatLng(lat, lng);

                map.setCenter(currentPos);
                displayCurrentMarker(currentPos);
            });
        }
    }

    // 2. 키워드 검색 실행
    function searchQuery() {
        const keyword = document.getElementById('keyword-input').value;

        if (!keyword.trim()) {
            alert("검색어를 입력해주세요!");
            return;
        }

        // 키워드로 장소 검색 (내 주변 위주로 검색하고 싶다면 location 옵션을 추가할 수 있음)
        placeService.keywordSearch(keyword, function(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayResults(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert("검색 결과가 없습니다.");
            } else {
                alert("오류가 발생했습니다.");
            }
        });
    }

    // 3. 결과 리스트 및 마커 표시
    function displayResults(places) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        clearMarkers();
        listEl.innerHTML = "";

        places.forEach((place, index) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            
            // 리스트 아이템 생성
            const li = document.createElement('li');
            li.innerHTML = `<span class="place-name">${place.place_name}</span>
                            <span class="place-address">${place.address_name}</span>`;
            
            // 마커 생성 및 이벤트 바인딩
            const marker = addMarker(position, place);

            // 리스트 클릭 이벤트
            li.onclick = () => {
                map.panTo(position);
                showInfoWindow(marker, place);
            };

            listEl.appendChild(li);
            bounds.extend(position);
        });

        map.setBounds(bounds);
    }

    // 4. 마커 생성 및 클릭 이벤트 추가
    function addMarker(position, place) {
        const marker = new kakao.maps.Marker({
            map: map,
            position: position
        });

        // 마커 클릭 시 정보창 표시
        kakao.maps.event.addListener(marker, 'click', function() {
            showInfoWindow(marker, place);
        });

        markers.push(marker);
        return marker;
    }

    // 5. 인포윈도우(팝업) 표시 함수
    function showInfoWindow(marker, place) {
        const content = `
            <div class="info-window">
                <strong>${place.place_name}</strong><br>
                <small>${place.address_name}</small><br>
                <a href="${place.place_url}" target="_blank" style="color:blue; font-size:11px;">상세보기</a>
            </div>`;
        
        infoWindow.setContent(content);
        infoWindow.open(map, marker);
    }

    // 현재 위치 표시용 특수 마커
    function displayCurrentMarker(position) {
        const marker = new kakao.maps.Marker({
            map: map,
            position: position
        });
        // 현재 위치라는 것을 알리기 위해 팝업을 바로 띄움
        infoWindow.setContent('<div style="padding:5px;">현재 내 위치</div>');
        infoWindow.open(map, marker);
    }

    function clearMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        infoWindow.close();
    }
</script>

</body>
</html>
